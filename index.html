<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf League Hub</title>
    <style>
        :root {
            --p1-color: #1976d2; 
            --p2-color: #d32f2f; 
            --neutral-bg: #555;   
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #eef2ee; padding-bottom: 50px; overflow-x: hidden; }
        
        /* FULL SCREEN LOGO HERO */
        .logo-container { 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            overflow: hidden;
        }
        .main-logo { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* This makes the logo fill the screen */
            display: block; 
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 5px; position: relative; z-index: 2; }
        h2 { text-align: center; color: #2e7d32; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem; }

        /* CAROUSEL - ULTRA COMPACT */
        .carousel-perspective { perspective: 2500px; width: 100%; overflow: hidden; padding: 10px 0; }
        .carousel-wrapper { 
            display: flex; 
            overflow-x: auto; 
            padding: 0 5px; 
            scroll-snap-type: x mandatory;
            gap: 10px; 
            align-items: flex-start;
            scrollbar-width: none;
        }
        .carousel-wrapper::-webkit-scrollbar { display: none; }
        .carousel-item { 
            flex: 0 0 65%; 
            max-width: 800px; 
            scroll-snap-align: start; 
            position: relative; 
        }

        /* MATCH CARDS */
        .match-container { background: #DCDCDC; padding: 8px; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #fff; }
        .player-header { display: flex; justify-content: flex-start; align-items: center; gap: 6px; font-weight: bold; font-size: 0.85rem; margin-bottom: 4px; padding-left: 5px; }
        .vs-label { font-size: 0.6rem; color: #666; font-style: italic; }
        .match-result-banner { text-align: left; font-size: 0.85rem; margin: 2px 0 8px 0; padding: 6px 10px; color: white; border-radius: 4px; font-weight: bold; width: fit-content; }

        /* SCORECARD TABLES */
        .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-bottom: 8px; }
        table { border-collapse: collapse; min-width: 480px; width: 100%; background: white; table-layout: fixed; font-size: 0.7rem; }
        th, td { border: 1px solid #bbb; padding: 4px 1px; text-align: center; }
        th { background: #444; color: white; }
        
        .row-label { background: #f0f0f0; font-weight: bold; width: 75px; text-align: left; padding-left: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.65rem; }
        .status-cell { font-size: 0.6rem; font-weight: bold; background: #fafafa; }

        .win-cell-p1 { background-color: var(--p1-color) !important; color: white !important; font-weight: bold; }
        .win-cell-p2 { background-color: var(--p2-color) !important; color: white !important; font-weight: bold; }

        /* STANDINGS & HISTORY */
        .section-box { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); margin: 15px 5px; overflow-x: auto; }
        .standings-table { min-width: 700px; width: 100%; font-size: 0.75rem; }
        .standings-table td:first-child { 
            width: 300px; 
            text-align: left; 
            padding-left: 10px; 
            font-weight: bold; 
            white-space: nowrap; 
        }

        .history-list { text-align: center; }
        .history-item { 
            padding: 5px; 
            border-bottom: 1px solid #eee; 
            font-size: 0.8rem; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        .hist-side { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .hist-side.p1 { text-align: right; padding-right: 8px; color: var(--p1-color); font-weight: bold; }
        .hist-side.p2 { text-align: left; padding-left: 8px; color: var(--p2-color); font-weight: bold; }
        .hist-center { min-width: 80px; text-align: center; font-weight: bold; background: #f4f4f4; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; }
        .week-label { background: #333; color: #fff; padding: 3px 10px; border-radius: 10px; font-size: 0.65rem; margin: 12px 0 5px 0; display: inline-block; }

        @media (max-width: 600px) {
            .carousel-item { flex: 0 0 80%; }
            .standings-table td:first-child { width: 180px; }
            .row-label { width: 70px; }
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="logo.png" alt="League Logo" class="main-logo">
</div>

<div class="container">
    <div class="carousel-perspective">
        <div class="carousel-wrapper" id="carousel-view"></div>
    </div>

    <div class="section-box">
        <h2>League Standings</h2>
        <table class="standings-table">
            <thead>
                <tr style="background: #333; color: white;">
                    <th>Player</th><th>Wins</th><th>All Square</th><th>Losses</th><th>Points</th>
                </tr>
            </thead>
            <tbody id="points-body"></tbody>
        </table>
    </div>

    <div class="section-box">
        <h2>Match History</h2>
        <div id="history-list" class="history-list"></div>
    </div>
</div>

<script>
    async function loadData() {
        try {
            const res = await fetch(`data.json?t=${new Date().getTime()}`);
            const data = await res.json();
            renderCarousel(data.matches || []);
            renderPoints(data.history || []);
            renderHistory(data.history || []);
        } catch (e) { console.error("Error:", e); }
    }

    function renderCarousel(matches) {
        const container = document.getElementById('carousel-view');
        if (matches.length === 0) {
            container.innerHTML = "<p align='center' style='font-size:0.8rem;'>No matches live.</p>";
            return;
        }

        container.innerHTML = matches.map((m) => {
            const sum = arr => arr.reduce((a, b) => a + (parseInt(b) || 0), 0);
            let finalStatus = 0;
            for(let i=0; i<18; i++) {
                let s1 = parseInt(m.p1Scores[i]), s2 = parseInt(m.p2Scores[i]);
                if(s1 && s2) { if(s1 < s2) finalStatus++; else if(s2 < s1) finalStatus--; }
            }
            const winnerName = finalStatus > 0 ? m.p1Name : m.p2Name;
            const bannerText = finalStatus === 0 ? "All Square" : `${winnerName} wins ${Math.abs(finalStatus)} UP`;
            const bannerColor = finalStatus === 0 ? "var(--neutral-bg)" : (finalStatus > 0 ? "var(--p1-color)" : "var(--p2-color)");

            return `
            <div class="carousel-item">
                <div class="match-container">
                    <div class="player-header">
                        <span style="color:var(--p1-color)">${m.p1Name}</span>
                        <span class="vs-label">vs</span>
                        <span style="color:var(--p2-color)">${m.p2Name}</span>
                    </div>
                    <div class="match-result-banner" style="background:${bannerColor}">${bannerText}</div>
                    ${[0, 9].map((start) => {
                        let runningStatus = 0;
                        for(let i=0; i<start; i++) {
                            let s1 = parseInt(m.p1Scores[i]), s2 = parseInt(m.p2Scores[i]);
                            if(s1 && s2) { if(s1 < s2) runningStatus++; else if(s2 < s1) runningStatus--; }
                        }
                        return `
                        <div class="table-scroll">
                        <table>
                            <tr><th class="row-label">Hole</th>${[1,2,3,4,5,6,7,8,9].map(n => `<th>${n+start}</th>`).join('')}<th>${start === 0 ? 'OUT' : 'IN'}</th></tr>
                            <tr><td class="row-label">Par</td>${m.pars.slice(start, start+9).map(p => `<td>${p}</td>`).join('')}<td>${sum(m.pars.slice(start, start+9))}</td></tr>
                            <tr>
                                <td class="row-label">${m.p1Name}</td>
                                ${m.p1Scores.slice(start, start+9).map((s, i) => {
                                    const p1S = parseInt(s), p2S = parseInt(m.p2Scores[start+i]);
                                    const isWin = p1S && p2S && p1S < p2S ? 'win-cell-p1' : '';
                                    return `<td class="${isWin}">${s || ''}</td>`;
                                }).join('')}
                                <td style="background:#eee"><b>${sum(m.p1Scores.slice(start, start+9))}</b></td>
                            </tr>
                            <tr>
                                <td class="row-label">${m.p2Name}</td>
                                ${m.p2Scores.slice(start, start+9).map((s, i) => {
                                    const p2S = parseInt(s), p1S = parseInt(m.p1Scores[start+i]);
                                    const isWin = p1S && p2S && p2S < p1S ? 'win-cell-p2' : '';
                                    return `<td class="${isWin}">${s || ''}</td>`;
                                }).join('')}
                                <td style="background:#eee"><b>${sum(m.p2Scores.slice(start, start+9))}</b></td>
                            </tr>
                            <tr>
                                <td class="row-label" style="font-size:0.55rem; color:#777;">Status</td>
                                ${m.p1Scores.slice(start, start+9).map((s, i) => {
                                    const p1S = parseInt(s), p2S = parseInt(m.p2Scores[start+i]);
                                    if(p1S && p2S) {
                                        if(p1S < p2S) runningStatus++; else if(p2S < p1S) runningStatus--;
                                        const display = runningStatus === 0 ? "A/S" : `${Math.abs(runningStatus)} UP`;
                                        const color = runningStatus === 0 ? "#888" : (runningStatus > 0 ? "var(--p1-color)" : "var(--p2-color)");
                                        return `<td class="status-cell" style="color:${color}">${display}</td>`;
                                    }
                                    return `<td class="status-cell"></td>`;
                                }).join('')}
                                <td style="background:#eee"></td>
                            </tr>
                        </table>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }).join('');
    }

    function renderPoints(history) {
        const stats = {};
        history.forEach(w => w.results.forEach(r => {
            [r.p1, r.p2].forEach(p => { if(!stats[p]) stats[p] = {w:0,d:0,l:0,pts:0}; });
            const text = r.text.toLowerCase();
            if(text.includes('v') && !text.includes('a/s')) {
                const parts = r.text.split(' ');
                const winner = parts[0];
                const loser = parts[2];
                if(stats[winner]) { stats[winner].w++; stats[winner].pts+=2; }
                if(stats[loser]) { stats[loser].l++; }
            } else {
                if(stats[r.p1]) { stats[r.p1].d++; stats[r.p1].pts+=1; }
                if(stats[r.p2]) { stats[r.p2].d++; stats[r.p2].pts+=1; }
            }
        }));
        const sorted = Object.keys(stats).sort((a,b) => stats[b].pts - stats[a].pts);
        document.getElementById('points-body').innerHTML = sorted.map(n => `
            <tr><td>${n}</td><td>${stats[n].w}</td><td>${stats[n].d}</td><td>${stats[n].l}</td><td style="background:#f9f9f9;font-weight:bold">${stats[n].pts}</td></tr>
        `).join('');
    }

    function renderHistory(history) {
        document.getElementById('history-list').innerHTML = history.slice().reverse().map(w => {
            const items = w.results.map(r => {
                const text = r.text.toLowerCase();
                const isAS = text.includes('a/s');
                const centerText = isAS ? "A/S" : "v";
                const parts = r.text.split(' ');
                const score = !isAS ? parts[parts.length - 1] : "";
                const winnerName = parts[0];
                let winClass = "";
                if(!isAS) winClass = (winnerName === r.p1) ? "hist-p1" : "hist-p2";

                return `
                <div class="history-item">
                    <div class="hist-side p1">${r.p1}</div>
                    <div class="hist-center">
                        ${centerText} <span class="${winClass}">${score}</span>
                    </div>
                    <div class="hist-side p2">${r.p2}</div>
                </div>`;
            }).join('');
            return `<div class="week-label">${w.label}</div>${items}`;
        }).join('');
    }
    loadData();
</script>
</body>
</html>
